services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    restart: always

  postgres:
    image: postgres:16
    container_name: codesentinel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codesentinel
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7
    container_name: codesentinel-redis
    ports:
      - "6379:6379"
    restart: always